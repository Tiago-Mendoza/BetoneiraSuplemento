# Configuracao para testes
spring.application.name=BetoneiraSuplementos

# Conexao com o H2 Database (Banco em memoria)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# Console do H2 desativado em testes
spring.h2.console.enabled=false

# Configuracoes JPA/Hibernate para testes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Inicializacao de dados para testes
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Configuracao Admin Padrão
app.admin.email=admin@betoneira.com
app.admin.password=123456
app.admin.name=Administrador

# Dados de teste (arquivos JSON para dados de teste)
app.users.file=./target/test-data/users.json
app.orders.file=./target/test-data/orders.json
app.products.file=./target/test-data/products.json
