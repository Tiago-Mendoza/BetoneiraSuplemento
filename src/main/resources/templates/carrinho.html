<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Carrinho - Betoneira Suplementos</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/image/favicon.png" />
    <link href="/css/style.css" rel="stylesheet" />
</head>
<body>

    <nav class="custom-navbar">
        <div class="navbar-container">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos">
            </a>

            <div class="navbar-links">
                <a class="nav-link" th:href="@{/home}">Home</a>
                <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                <a class="nav-link" th:href="@{/sobre-nos}">Sobre nós</a>
            </div>

            <div class="navbar-icons">
                <a class="nav-icon" href="#">
                    <img th:src="@{/image/Lupa.png}" alt="Buscar">
                </a>
                <a class="nav-icon" th:href="@{/carrinho}">
                    <img th:src="@{/image/CarCompras.png}" alt="Carrinho de Compras">
                </a>
                <a class="nav-icon" th:href="@{/login}">
                    <img th:src="@{/image/Seta.png}" alt="Login">
                </a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <h1 class="page-title">Meu Carrinho</h1>

            <div class="page-message page-message-success" th:if="${param.added}">
                Item adicionado ao carrinho.
            </div>

            <div class="page-message page-message-info" th:if="${param.updated}">
                Quantidade atualizada.
            </div>

            <div class="page-message page-message-info" th:if="${param.removed}">
                Item removido do carrinho.
            </div>

            <div class="page-message page-message-info" th:if="${param.empty}">
                Adicione um item antes de seguir para o checkout.
            </div>

            <div class="cart-container">
                <div class="cart-items">
                    <div class="cart-empty" th:if="${cart.empty}">
                        <p>Seu carrinho está vazio.</p>
                        <a class="cart-empty-link" th:href="@{/produtos}">Ver produtos</a>
                    </div>

                    <div class="cart-item" th:each="item : ${cart.items}">
                        <div class="cart-item-img-container">
                            <img th:src="${item.product.imageUrl}" th:alt="${item.product.altText}">
                        </div>
                        <div class="cart-item-details">
                            <h3 class="cart-item-title" th:text="${item.product.name}"></h3>
                            <p class="cart-item-desc" th:text="${item.product.displayDescription}"></p>
                            <span class="product-weight">Em estoque</span>
                        </div>
                        <div class="cart-item-actions">
                            <div class="qty-control">
                                <form class="qty-form" th:action="@{/carrinho/atualizar}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="productId" th:value="${item.product.id}">
                                    <input type="hidden" name="quantity" th:value="${item.quantity - 1}">
                                    <button type="submit" class="qty-btn" th:disabled="${item.quantity == 1}">-</button>
                                </form>
                                <input class="qty-input" type="number" th:value="${item.quantity}" min="1" readonly>
                                <form class="qty-form" th:action="@{/carrinho/atualizar}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="productId" th:value="${item.product.id}">
                                    <input type="hidden" name="quantity" th:value="${item.quantity + 1}">
                                    <button type="submit" class="qty-btn">+</button>
                                </form>
                            </div>
                            <div class="cart-item-price" th:text="${item.formattedLineTotal}"></div>
                            <form th:action="@{/carrinho/remover}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="productId" th:value="${item.product.id}">
                                <button type="submit" class="btn-remove">Remover</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
                    <h2 class="summary-title">Resumo do Pedido</h2>

                    <div class="summary-row">
                        <span th:text="${'Subtotal (' + cart.itemsLabel + ')'}"></span>
                        <span th:text="${cart.formattedSubtotal}"></span>
                    </div>
                    <div class="summary-row">
                        <span>Frete Expresso</span>
                        <span th:text="${cart.formattedShipping}"></span>
                    </div>

                    <div class="summary-total">
                        <span>Total:</span>
                        <span th:text="${cart.formattedTotal}"></span>
                    </div>

                    <a
                        class="btn-checkout checkout-link"
                        th:classappend="${cart.empty} ? ' is-disabled' : ''"
                        th:href="${cart.empty} ? @{/carrinho} : @{/checkout}"
                    >
                        Ir para checkout
                    </a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
