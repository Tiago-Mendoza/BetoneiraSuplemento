<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Betoneira Suplementos</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/image/favicon.png" />
    <link href="/css/style.css" rel="stylesheet" />
</head>
<body>

    <nav class="custom-navbar">
        <div class="navbar-container">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos">
            </a>

            <div class="navbar-links">
                <a class="nav-link active" th:href="@{/home}">Home</a>
                <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                <a class="nav-link" th:href="@{/sobre-nos}">Sobre nós</a>
            </div>

            <div class="navbar-icons">
                <a class="nav-icon" href="#">
                    <img th:src="@{/image/Lupa.png}" alt="Buscar">
                </a>
                <a class="nav-icon" th:href="@{/carrinho}">
                    <img th:src="@{/image/CarCompras.png}" alt="Carrinho de Compras">
                </a>
                <a class="nav-icon" th:href="@{/login}">
                    <img th:src="@{/image/Seta.png}" alt="Login">
                </a>
            </div>
        </div>
    </nav>

    <main style="padding-top: 0; padding-left: 0; padding-right: 0; align-items: stretch;">
        <section class="home-banner" style="width: 100%; display: flex; justify-content: center; background-color: #111;">
            <a th:href="@{/produtos}" style="display: block; width: 100%; max-width: 1920px; text-decoration: none; position: relative;">
                <img th:src="@{/image/BannerHome1.png}" alt="Banner Promocional Betoneira" style="width: 100%; height: auto; display: block; object-fit: cover;">
                <div class="banner-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer;"></div>
            </a>
        </section>

        <div class="container" style="margin: 0 auto; padding: 0 1.5rem;">
            <h2 id="produtos" style="text-align: center; font-size: 2.5rem; font-weight: 800; color: #000; text-transform: uppercase; margin: 4rem 0 2rem 0; letter-spacing: -1px;">Produtos mais vendidos</h2>

            <div class="product-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="product-card" th:each="product : ${featuredProducts}">
                    <div class="product-image-container">
                        <img th:src="${product.imageUrl}" th:alt="${product.altText}">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title" th:text="${product.name}"></h3>
                        <p class="product-subtitle" th:text="${product.subtitle}"></p>
                        <span class="product-weight" th:text="${product.weight}"></span>
                        <p class="product-price" th:text="${product.formattedPrice}"></p>
                        <form class="add-to-cart-form" th:action="@{/carrinho/adicionar}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <button type="submit" class="btn-buy">Adicionar ao carrinho</button>
                        </form>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 3rem;">
                <a th:href="@{/produtos}" style="display: inline-block; padding: 1rem 3rem; background: transparent; color: var(--color-black); border: 2px solid var(--color-black); border-radius: 8px; font-weight: 700; text-transform: uppercase; text-decoration: none; transition: 0.3s;">Ver todos os produtos</a>
            </div>
        </div>
    </main>
</body>
</html>
