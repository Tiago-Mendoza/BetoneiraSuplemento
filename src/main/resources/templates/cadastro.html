<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Betoneira Suplementos</title>
    <meta name="description" content="Crie sua conta na Betoneira Suplementos e aproveite os melhores suplementos com entrega rápida.">
    <link rel="icon" th:href="@{/image/favicon.png}" />
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}">
</head>
<body>

    <!-- Universal Navbar -->
    <nav class="custom-navbar">
        <div class="navbar-container">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos">
            </a>

            <div class="navbar-links">
                <a class="nav-link" th:href="@{/home}">Home</a>
                <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                <a class="nav-link" th:href="@{/sobre-nos}">Sobre nós</a>
            </div>

            <div class="navbar-icons">
                <a class="nav-icon" th:href="@{/carrinho}">
                    <img th:src="@{/image/CarCompras.png}" alt="Carrinho de Compras">
                </a>
                <!-- Usuário logado: mostra menu dropdown -->
                <div class="user-menu-wrapper" sec:authorize="isAuthenticated()">
                    <button class="nav-icon user-menu-toggle" id="userMenuBtn" aria-label="Menu do usuário">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                        </svg>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a class="user-dropdown-item" th:href="@{/meus-pedidos}">Meus Pedidos</a>
                        <a class="user-dropdown-item admin-link" th:href="@{/admin/produtos}" sec:authorize="hasRole('ADMIN')">Painel Admin</a>
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="user-dropdown-item user-dropdown-logout">Sair</button>
                        </form>
                    </div>
                </div>
                <!-- Usuário não logado: mostra botão Entrar -->
                <a class="nav-icon active" th:href="@{/login}" sec:authorize="!isAuthenticated()">
                    <img th:src="@{/image/Seta.png}" alt="Login">
                </a>
            </div>
        </div>
    </nav>

    <div class="auth-page-container">
        <div class="auth-container" style="max-width: 500px;">
            <!-- Logo clicável -->
            <div class="logo-wrapper">
                <a th:href="@{/home}">
                    <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos Logo">
                </a>
            </div>

            <form class="auth-form" th:action="@{/cadastro}" th:object="${cadastroForm}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Nome -->
                <div class="form-group">
                    <input
                        type="text"
                        id="nome"
                        th:field="*{nome}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('nome')} ? ' input-error' : ''"
                        placeholder="Nome Completo"
                        autocomplete="name"
                        maxlength="100"
                        required
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
                </div>

                <!-- CPF -->
                <div class="form-group">
                    <input
                        type="text"
                        id="cpf"
                        th:field="*{cpf}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('cpf')} ? ' input-error' : ''"
                        placeholder="CPF (somente números)"
                        inputmode="numeric"
                        maxlength="14"
                        required
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></p>
                </div>

                <!-- E-mail -->
                <div class="form-group">
                    <input
                        type="email"
                        id="email"
                        th:field="*{email}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('email')} ? ' input-error' : ''"
                        placeholder="Ex: email@mail.com"
                        autocomplete="email"
                        maxlength="150"
                        required
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <!-- Telefone Celular -->
                <div class="form-group">
                    <input
                        type="tel"
                        id="telefoneCelular"
                        th:field="*{telefoneCelular}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('telefoneCelular')} ? ' input-error' : ''"
                        placeholder="Telefone celular*"
                        autocomplete="tel"
                        maxlength="15"
                        required
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('telefoneCelular')}" th:errors="*{telefoneCelular}"></p>
                </div>

                <!-- Telefone Fixo -->
                <div class="form-group">
                    <input
                        type="tel"
                        id="telefoneFixo"
                        th:field="*{telefoneFixo}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('telefoneFixo')} ? ' input-error' : ''"
                        placeholder="Telefone fixo (opcional)"
                        maxlength="15"
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('telefoneFixo')}" th:errors="*{telefoneFixo}"></p>
                </div>

                <!-- Gênero -->
                <div class="gender-container">
                    <div class="gender-options">
                        <label class="gender-option">
                            <input type="radio" th:field="*{genero}" value="Masculino" required> Masculino
                        </label>
                        <label class="gender-option">
                            <input type="radio" th:field="*{genero}" value="Feminino"> Feminino
                        </label>
                        <label class="gender-option">
                            <input type="radio" th:field="*{genero}" value="Outro"> Outro
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></p>
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <input
                        type="password"
                        id="password"
                        th:field="*{password}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('password')} ? ' input-error' : ''"
                        placeholder="Criar senha (6-15 caracteres)"
                        autocomplete="new-password"
                        minlength="6"
                        maxlength="15"
                        required
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <!-- Confirmar Senha -->
                <div class="form-group">
                    <input
                        type="password"
                        id="confirmPassword"
                        th:field="*{confirmPassword}"
                        class="input-control"
                        th:classappend="${#fields.hasErrors('confirmPassword')} ? ' input-error' : ''"
                        placeholder="Confirmar senha"
                        autocomplete="new-password"
                        minlength="6"
                        maxlength="15"
                        required
                    >
                    <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                </div>

                <button type="submit" class="btn-auth">Cadastrar</button>

                <div class="auth-links">
                    <a th:href="@{/login}" class="auth-link">Já tem conta? Entrar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Toggle dropdown do usuário
        const btn = document.getElementById('userMenuBtn');
        const dropdown = document.getElementById('userDropdown');
        if (btn && dropdown) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.classList.toggle('open');
            });
            document.addEventListener('click', function() {
                dropdown.classList.remove('open');
            });
        }
    </script>
</body>
</html>
