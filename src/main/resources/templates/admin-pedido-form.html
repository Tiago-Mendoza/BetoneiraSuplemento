<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle + ' - Admin'}"></title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/image/favicon.png" />
    <link href="/css/style.css" rel="stylesheet" />
</head>
<body>

    <nav class="custom-navbar">
        <div class="navbar-container">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos">
            </a>

            <div class="navbar-links">
                <a class="nav-link" th:href="@{/home}">Home</a>
                <a class="nav-link" th:href="@{/meus-pedidos}">Meus pedidos</a>
                <a class="nav-link active" th:href="@{/admin/pedidos}">Admin</a>
            </div>

            <div class="navbar-icons">
                <form th:action="@{/logout}" method="post" class="nav-logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="nav-icon nav-icon-button">
                        <img th:src="@{/image/Seta.png}" alt="Sair">
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="section-header">
                <div>
                    <h1 class="page-title" th:text="${pageTitle}"></h1>
                    <p class="section-subtitle" th:text="${createMode ? 'Criação manual de pedido' : order.orderNumber}"></p>
                </div>
                <a class="secondary-link" th:href="@{/admin/pedidos}">Voltar para lista</a>
            </div>

            <div class="admin-switcher">
                <a class="admin-switch-link is-active" th:href="@{/admin/pedidos}">Pedidos</a>
                <a class="admin-switch-link" th:href="@{/admin/produtos}">Produtos</a>
            </div>

            <div class="checkout-layout">
                <section class="checkout-panel">
                    <form class="checkout-form" th:action="@{${formAction}}" th:object="${orderForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="checkout-grid">
                            <div class="form-group">
                                <label class="checkout-label" for="customerEmail">E-mail do cliente</label>
                                <input
                                    id="customerEmail"
                                    th:field="*{customerEmail}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('customerEmail')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('customerEmail')}" th:errors="*{customerEmail}"></p>
                            </div>

                            <div class="form-group">
                                <label class="checkout-label" for="recipientName">Destinatário</label>
                                <input
                                    id="recipientName"
                                    th:field="*{recipientName}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('recipientName')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('recipientName')}" th:errors="*{recipientName}"></p>
                            </div>
                        </div>

                        <div class="checkout-grid checkout-grid-3">
                            <div class="form-group">
                                <label class="checkout-label" for="zipCode">CEP</label>
                                <input
                                    id="zipCode"
                                    th:field="*{zipCode}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('zipCode')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('zipCode')}" th:errors="*{zipCode}"></p>
                            </div>

                            <div class="form-group checkout-grid-span-2">
                                <label class="checkout-label" for="street">Logradouro</label>
                                <input
                                    id="street"
                                    th:field="*{street}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('street')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('street')}" th:errors="*{street}"></p>
                            </div>
                        </div>

                        <div class="checkout-grid checkout-grid-3">
                            <div class="form-group">
                                <label class="checkout-label" for="number">Número</label>
                                <input
                                    id="number"
                                    th:field="*{number}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('number')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('number')}" th:errors="*{number}"></p>
                            </div>

                            <div class="form-group checkout-grid-span-2">
                                <label class="checkout-label" for="complement">Complemento</label>
                                <input id="complement" th:field="*{complement}" class="input-control">
                            </div>
                        </div>

                        <div class="checkout-grid checkout-grid-3">
                            <div class="form-group">
                                <label class="checkout-label" for="neighborhood">Bairro</label>
                                <input
                                    id="neighborhood"
                                    th:field="*{neighborhood}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('neighborhood')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('neighborhood')}" th:errors="*{neighborhood}"></p>
                            </div>

                            <div class="form-group">
                                <label class="checkout-label" for="city">Cidade</label>
                                <input
                                    id="city"
                                    th:field="*{city}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('city')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></p>
                            </div>

                            <div class="form-group">
                                <label class="checkout-label" for="state">Estado</label>
                                <input
                                    id="state"
                                    th:field="*{state}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('state')} ? ' input-error' : ''"
                                    required
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></p>
                            </div>
                        </div>

                        <div class="checkout-grid">
                            <div class="form-group">
                                <label class="checkout-label" for="paymentMethod">Pagamento</label>
                                <select
                                    id="paymentMethod"
                                    th:field="*{paymentMethod}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('paymentMethod')} ? ' input-error' : ''"
                                >
                                    <option value="">Selecione</option>
                                    <option th:each="paymentMethod : ${paymentMethods}" th:value="${paymentMethod}" th:text="${paymentMethod}"></option>
                                </select>
                                <p class="field-error" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></p>
                            </div>

                            <div class="form-group">
                                <label class="checkout-label" for="status">Status</label>
                                <select
                                    id="status"
                                    th:field="*{status}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('status')} ? ' input-error' : ''"
                                >
                                    <option value="">Selecione</option>
                                    <option th:each="status : ${orderStatuses}" th:value="${status}" th:text="${status}"></option>
                                </select>
                                <p class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
                            </div>
                        </div>

                        <div class="checkout-grid" th:if="${createMode}">
                            <div class="form-group">
                                <label class="checkout-label" for="productId">Produto</label>
                                <select
                                    id="productId"
                                    th:field="*{productId}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('productId')} ? ' input-error' : ''"
                                >
                                    <option value="">Selecione</option>
                                    <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.name + ' - ' + product.subtitle}"></option>
                                </select>
                                <p class="field-error" th:if="${#fields.hasErrors('productId')}" th:errors="*{productId}"></p>
                            </div>

                            <div class="form-group">
                                <label class="checkout-label" for="quantity">Quantidade</label>
                                <input
                                    id="quantity"
                                    type="number"
                                    th:field="*{quantity}"
                                    class="input-control"
                                    th:classappend="${#fields.hasErrors('quantity')} ? ' input-error' : ''"
                                    min="1"
                                >
                                <p class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></p>
                            </div>
                        </div>

                        <div class="checkout-success-box" th:if="${!createMode}">
                            <h2 class="checkout-title">Itens do pedido</h2>
                            <div class="checkout-summary-item" th:each="item : ${order.items}">
                                <div>
                                    <strong th:text="${item.productName}"></strong>
                                    <p th:text="${item.productSubtitle + ' • ' + item.productWeight}"></p>
                                </div>
                                <div class="checkout-summary-qty-price">
                                    <span th:text="${'x' + item.quantity}"></span>
                                    <strong th:text="${#numbers.formatCurrency(item.lineTotal)}"></strong>
                                </div>
                            </div>
                        </div>

                        <div class="checkout-actions">
                            <a class="secondary-link" th:href="@{/admin/pedidos}">Cancelar</a>
                            <button type="submit" class="btn-checkout" th:text="${createMode ? 'Criar pedido' : 'Salvar alterações'}"></button>
                        </div>
                    </form>
                </section>

                <aside class="cart-summary checkout-summary" th:if="${!createMode}">
                    <h2 class="summary-title">Resumo</h2>
                    <div class="summary-row">
                        <span>Origem</span>
                        <span th:text="${order.source}"></span>
                    </div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span th:text="${order.formattedSubtotal}"></span>
                    </div>
                    <div class="summary-row">
                        <span>Frete</span>
                        <span th:text="${order.formattedShipping}"></span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span th:text="${order.formattedTotal}"></span>
                    </div>
                </aside>
            </div>
        </div>
    </main>

</body>
</html>
