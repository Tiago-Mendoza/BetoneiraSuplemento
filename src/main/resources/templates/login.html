<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Betoneira Suplementos</title>
    <link rel="icon" th:href="@{/image/favicon.png}" />
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}">
</head>
<body>

    <!-- Universal Navbar -->
    <nav class="custom-navbar">
        <div class="navbar-container">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos">
            </a>

            <div class="navbar-links">
                <a class="nav-link" th:href="@{/home}">Home</a>
                <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                <a class="nav-link" th:href="@{/sobre-nos}">Sobre nós</a>
            </div>

            <div class="navbar-icons">
                <a class="nav-icon" href="#">
                    <img th:src="@{/image/Lupa.png}" alt="Buscar">
                </a>
                <a class="nav-icon" th:href="@{/carrinho}">
                    <img th:src="@{/image/CarCompras.png}" alt="Carrinho de Compras">
                </a>
                <a class="nav-icon active" th:href="@{/login}">
                    <img th:src="@{/image/Seta.png}" alt="Login">
                </a>
            </div>
        </div>
    </nav>
    
    <div class="auth-page-container">
        <div class="auth-container">
            <!-- Clicable Logo Redirecting to Home -->
            <div class="logo-wrapper">
                <a th:href="@{/home}">
                    <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos Logo">
                </a>
            </div>

            <form class="auth-form" th:action="@{/login}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="auth-message auth-message-success" th:if="${param.registered}">
                    Cadastro realizado com sucesso. Faça seu login.
                </div>

                <div class="auth-message auth-message-error" th:if="${param.error}">
                    E-mail ou senha inválidos.
                </div>

                <div class="auth-message auth-message-success" th:if="${param.logout}">
                    Você saiu da sua conta.
                </div>

                <div class="form-group">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="input-control"
                        placeholder="Ex: Email@mail.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="input-control"
                        placeholder="Adicionar Senha"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div class="auth-links" style="margin-top: 0;">
                    <a href="#" class="auth-link">Esqueci minha senha</a>
                </div>

                <button type="submit" class="btn-auth">Entrar</button>

                <div class="auth-links">
                    <a th:href="@{/cadastro}" class="auth-link">Cadastre-se</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
