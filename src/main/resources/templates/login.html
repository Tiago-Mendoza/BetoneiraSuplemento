<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Betoneira Suplementos</title>
    <link rel="stylesheet" th:href="@{/css/premium-auth.css}">
</head>
<body>
    <div class="top-bar"></div>
    
    <div class="auth-container">
        <div class="logo-wrapper">
            <img th:src="@{/image/BetoneiraSuplementos 3.png}" alt="Betoneira Suplementos Logo">
        </div>

        <form class="auth-form" th:action="@{/login}" method="POST">
            <div class="form-group">
                <input type="email" id="email" name="email" class="input-control" placeholder="Ex: Email@mail.com" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="password" class="input-control" placeholder="Adicionar Senha" required>
            </div>

            <div class="auth-links" style="margin-top: 0;">
                <a href="#" class="auth-link">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn-auth">Entrar</button>

            <div class="auth-links">
                <a th:href="@{/cadastro}" class="auth-link">Cadastre-se</a>
            </div>
        </form>
    </div>
</body>
</html>
