spring.application.name=BetoneiraSuplementos

# Conexao com o H2 Database (Banco em memoria)
spring.datasource.url=jdbc:h2:mem:betoneira;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# Console do H2 (acesse em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracoes JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Script de inicializacao do banco
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Configuracao Admin Padrão
app.admin.email=admin@betoneira.com
app.admin.password=123456
app.admin.name=Administrador
