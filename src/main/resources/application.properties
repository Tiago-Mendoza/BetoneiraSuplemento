spring.application.name=BetoneiraSuplementos

# Conexao com o MySQL (Preencha com o seu usuario e senha)
spring.datasource.url=jdbc:mysql://localhost:3306/betoneira?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracoes JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desativado por padrao para nao duplicar produtos no MySQL. Mude para 'always' na 1a vez se quiser rodar o data.sql
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Configuracao Admin Padrão
app.admin.email=admin@betoneira.com
app.admin.password=123456
app.admin.name=Administrador
